<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホップ感謝祭 2026.03.13 | PlusPivot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho+B1:wght@500;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&display=swap" rel="stylesheet">
<style>
:root{
  --coral:#E8918E; --coral-deep:#D26F6B; --coral-soft:#FCEEED; --coral-line:#F0B5B3;
  --ink:#2B2B30; --ink-soft:#5A5A63; --paper:#FDF7F6;
  --blue:#6FB9CB;
  --gold-1:#F4DC8C; --gold-2:#D8B24A; --gold-3:#A87E2A;
  --award-bg:#101013; --award-bg2:#1A1A1F;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0c0c0e;font-family:"Zen Kaku Gothic New",sans-serif;-webkit-font-smoothing:antialiased}

/* ---------- STAGE ---------- */
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
#deck{position:relative;width:min(100vw, 177.78vh);height:min(56.25vw,100vh);
  aspect-ratio:16/9;background:var(--paper);overflow:hidden;box-shadow:0 40px 120px rgba(0,0,0,.6)}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
  padding:7% 8%;opacity:0;visibility:hidden;transition:opacity .55s ease;pointer-events:none}
.slide.active{opacity:1;visibility:visible;pointer-events:auto}
.slide.active [data-anim]{animation:rise .7s cubic-bezier(.2,.7,.2,1) both}
.slide.active [data-anim]:nth-child(1){animation-delay:.05s}
.slide [data-anim]{opacity:0}
@keyframes rise{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
.d1{animation-delay:.08s!important}.d2{animation-delay:.18s!important}.d3{animation-delay:.28s!important}
.d4{animation-delay:.38s!important}.d5{animation-delay:.48s!important}.d6{animation-delay:.58s!important}
.d7{animation-delay:.68s!important}.d8{animation-delay:.78s!important}

/* font scaling relative to deck */
#deck{font-size:clamp(10px,1.55vh,22px)}
.slide{font-size:1rem}

/* ---------- THEMES ---------- */
.t-coral{background:
  radial-gradient(120% 90% at 90% 110%, #FBE3E1 0%, transparent 55%),
  radial-gradient(90% 80% at 0% -10%, #FCEFEE 0%, transparent 50%),
  var(--paper);color:var(--ink)}
.t-coral::before{content:"";position:absolute;top:0;left:0;right:0;height:1.6%;
  background:repeating-linear-gradient(90deg,var(--coral) 0 6%,var(--coral-line) 6% 12%)}
.t-coral .footbar{position:absolute;left:0;right:0;bottom:0;height:9%;background:var(--coral);
  display:flex;align-items:center;justify-content:center;gap:.6em;color:#fff;letter-spacing:.18em;font-weight:700}
.t-coral .footbar .pp{display:flex;align-items:center;gap:.45em;font-family:"Bricolage Grotesque";font-size:1.25em}
.t-coral .footbar .pp svg{width:1.3em;height:1.3em}

.t-award{background:
  radial-gradient(120% 100% at 50% -20%, #26241c 0%, transparent 55%),
  linear-gradient(180deg,#141318 0%, #0c0b0e 100%);color:#EDE7DA}
.t-award::before,.t-award::after{content:"";position:absolute;left:0;right:0;height:.9%;
  background:linear-gradient(90deg,transparent,var(--gold-2),var(--gold-1),var(--gold-2),transparent)}
.t-award::before{top:0}.t-award::after{bottom:0}

.t-quiz{background:var(--coral-soft);color:var(--ink);overflow:hidden}
.t-quiz .ribbon{position:absolute;top:0;left:0;right:0;height:22%;
  background:linear-gradient(100deg,#ff5e3a,#ffb13a 28%,#ffe24d 46%,#2ed3a8 64%,#3aa0ff 82%,#7b5cff);
  filter:saturate(1.1);clip-path:polygon(0 0,100% 0,100% 55%,0 100%);opacity:.92}

/* ---------- TYPE HELPERS ---------- */
.kana-min{font-family:"Shippori Mincho B1",serif}
.lat{font-family:"Cormorant Garamond",serif}
.eyebrow{font-size:.95em;letter-spacing:.42em;font-weight:700;color:var(--coral-deep);text-transform:uppercase}
.t-award .eyebrow{color:var(--gold-2)}
h1.big{font-size:5.2em;font-weight:900;line-height:1.02;letter-spacing:.02em}
.sub{font-size:1.15em;color:var(--ink-soft);line-height:1.9;font-weight:500}

/* logo lockup */
.logo{display:inline-flex;align-items:baseline;gap:.12em;font-weight:900}
.logo .tag{font-size:.5em;color:var(--coral);letter-spacing:.18em;display:block;font-weight:700;margin-bottom:.2em}
.logo .mk{color:var(--blue)} .logo .pl{color:var(--coral)} .logo .hp{color:var(--coral)}

/* ---------- TITLE SLIDE ---------- */
.title-wrap{text-align:center;display:flex;flex-direction:column;align-items:center;gap:1.1em;z-index:2}
.title-wrap .brand{font-size:3.4em}
.title-wrap .brand .tag{font-size:.26em;letter-spacing:.5em;margin-bottom:.4em}
.title-wrap h1.big{font-size:6em;color:var(--ink);text-shadow:0 2px 0 #fff}
.title-wrap .date{font-family:"Bricolage Grotesque";font-size:1.7em;letter-spacing:.18em;color:var(--coral-deep);font-weight:800}

/* ---------- PERSON / SECTION ---------- */
.section-head{display:flex;align-items:center;gap:.7em;margin-bottom:.4em}
.section-head .bar{width:.45em;height:1.6em;background:var(--coral);border-radius:2px}
.title-only{justify-content:center;align-items:flex-start}
.title-only h1.big{font-size:6.4em}
.title-only .accent{width:3.2em;height:.18em;background:var(--coral);margin-top:.5em;border-radius:3px}

.person{display:grid;grid-template-columns:1fr 1.1fr;gap:5%;align-items:center}
.person .avatar{aspect-ratio:1;border-radius:50%;background:
  radial-gradient(circle at 35% 30%,#fff,var(--coral-soft));border:.5em solid #fff;
  box-shadow:0 18px 50px rgba(210,111,107,.35), inset 0 0 0 1px var(--coral-line);
  display:flex;align-items:center;justify-content:center;width:78%;justify-self:center}
.person .avatar span{font-size:5.5em;font-weight:900;color:var(--coral);font-family:"Shippori Mincho B1"}
.person .role{font-size:1.05em;color:var(--coral-deep);font-weight:700;letter-spacing:.08em}
.person .name{font-size:3.6em;font-weight:900;margin:.12em 0 .4em;font-family:"Shippori Mincho B1"}
.person .meta{list-style:none;display:flex;flex-direction:column;gap:.5em;font-size:1.02em;color:var(--ink-soft)}
.person .meta li{display:flex;gap:.7em;align-items:baseline}
.person .meta b{color:var(--coral-deep);font-size:.85em;min-width:5.2em;letter-spacing:.1em}
.chip{display:inline-block;background:#fff;border:1.5px solid var(--coral-line);color:var(--coral-deep);
  padding:.3em .9em;border-radius:999px;font-weight:700;font-size:.92em;margin:.2em .3em 0 0}

/* ---------- SCHEDULE ---------- */
.timeline{display:flex;flex-direction:column;gap:.0;margin-top:.6em;max-width:78%}
.tl-row{display:grid;grid-template-columns:5.5em 1fr;gap:1.4em;align-items:center;padding:.7em 0;
  border-bottom:1.5px dashed var(--coral-line);position:relative}
.tl-row .tm{font-family:"Bricolage Grotesque";font-weight:800;font-size:1.5em;color:var(--coral-deep)}
.tl-row .ev{font-size:1.35em;font-weight:700}
.tl-row::before{content:"";position:absolute;left:5.0em;top:50%;width:.7em;height:.7em;border-radius:50%;
  background:var(--coral);transform:translateY(-50%);box-shadow:0 0 0 .3em var(--coral-soft)}

/* ---------- NOTICES ---------- */
.notes{display:grid;grid-template-columns:1fr 1fr;gap:1.1em 3em;margin-top:.5em}
.note{display:flex;gap:.8em;align-items:flex-start}
.note .ic{flex:none;width:2.4em;height:2.4em;border-radius:.7em;background:var(--coral-soft);
  display:flex;align-items:center;justify-content:center;font-size:1.1em;border:1.5px solid var(--coral-line)}
.note h3{font-size:1.1em;margin-bottom:.15em}
.note p{font-size:.92em;color:var(--ink-soft);line-height:1.6}

/* ---------- ICEBREAK / GAME ---------- */
.bigcard{background:#fff;border-radius:1.4em;padding:2.2em 2.6em;box-shadow:0 24px 60px rgba(210,111,107,.18);
  border:1px solid var(--coral-line);max-width:80%}
.bigcard h2{font-size:1.9em;font-weight:900;margin-bottom:.7em;color:var(--coral-deep)}
.bigcard ul{list-style:none;display:flex;flex-wrap:wrap;gap:.6em;margin-top:.8em}
.bigcard ul li{background:var(--coral-soft);padding:.5em 1.1em;border-radius:999px;font-weight:700;font-size:1.05em}
.bigcard .lead{font-size:1.2em;font-weight:700;line-height:1.7}

.rules{display:grid;grid-template-columns:1.2fr 1fr;gap:4%}
.rules .rlist{list-style:none;display:flex;flex-direction:column;gap:.55em}
.rules .rlist li{display:flex;gap:.7em;font-size:1.02em;align-items:baseline}
.rules .rlist .n{flex:none;width:1.7em;height:1.7em;border-radius:50%;background:var(--coral);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85em;font-family:"Bricolage Grotesque"}
.example{background:linear-gradient(160deg,#fff,var(--coral-soft));border-radius:1.2em;padding:1.6em;border:1px solid var(--coral-line)}
.example h4{color:var(--coral-deep);letter-spacing:.1em;margin-bottom:.6em}
.example .hints{display:flex;flex-direction:column;gap:.3em;font-size:.98em;color:var(--ink-soft)}
.example .ans{margin-top:.9em;padding-top:.8em;border-top:1.5px dashed var(--coral-line);font-size:1.5em;font-weight:900;color:var(--coral-deep)}

.qboard{columns:3;column-gap:2em;font-size:1.02em;margin-top:.5em;max-width:90%}
.qboard span{display:block;padding:.18em 0;font-weight:600;break-inside:avoid}
.qboard b{font-family:"Bricolage Grotesque";color:var(--coral-deep);margin-right:.5em}

/* ---------- AWARD ---------- */
.t-award .award-frame{position:absolute;inset:3.5% 4%;border:2px solid transparent;
  border-image:linear-gradient(135deg,var(--gold-3),var(--gold-1),var(--gold-3)) 1;pointer-events:none;opacity:.55}
.award-divider{text-align:center;display:flex;flex-direction:column;align-items:center;gap:.5em;z-index:2}
.award-divider .lat{font-size:1.4em;letter-spacing:.5em;color:var(--gold-2);font-style:italic}
.award-divider h1{font-family:"Shippori Mincho B1";font-size:5.4em;font-weight:800;
  background:linear-gradient(180deg,var(--gold-1),var(--gold-2) 55%,var(--gold-3));
  -webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.12em;
  text-shadow:0 8px 30px rgba(216,178,74,.25)}
.award-divider .rule{width:5em;height:1px;background:linear-gradient(90deg,transparent,var(--gold-2),transparent);margin-top:.4em}

.award-concept{z-index:2}
.award-concept .lead{font-family:"Shippori Mincho B1";font-size:1.7em;line-height:1.9;font-weight:500;max-width:82%}
.award-concept .lead em{color:var(--gold-1);font-style:normal}
.award-pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:1.6em;margin-top:1.8em;max-width:88%}
.award-pillars .p{border:1px solid rgba(216,178,74,.35);border-radius:.6em;padding:1.2em;background:rgba(216,178,74,.05)}
.award-pillars .p .k{color:var(--gold-2);letter-spacing:.2em;font-size:.85em;margin-bottom:.4em}
.award-pillars .p .v{font-family:"Shippori Mincho B1";font-size:1.25em;font-weight:700;line-height:1.5}

/* award winners slide */
.aw-head{display:flex;align-items:baseline;gap:1em;margin-bottom:.8em;z-index:2;position:relative}
.aw-head .dept{font-family:"Shippori Mincho B1";font-size:2.4em;font-weight:800;color:#fff}
.aw-head .lat{color:var(--gold-2);font-size:1em;letter-spacing:.35em;font-style:italic}
.winners{display:grid;grid-template-columns:1fr 1fr;gap:1.6em;z-index:2;position:relative}
.wcard{border-radius:.8em;padding:1.5em 1.6em;position:relative;overflow:hidden;
  background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
  border:1px solid rgba(216,178,74,.25)}
.wcard .tier{display:inline-flex;align-items:center;gap:.5em;font-family:"Cormorant Garamond";font-size:1.15em;
  letter-spacing:.18em;font-weight:600;padding:.15em .9em;border-radius:999px;margin-bottom:.7em}
.wcard.gold .tier{background:linear-gradient(90deg,var(--gold-2),var(--gold-1));color:#1a1505}
.wcard.silver .tier{background:linear-gradient(90deg,#9aa0a6,#d6dadd);color:#1a1a1a}
.wcard .metric{font-family:"Cormorant Garamond";font-weight:600;font-size:3.4em;line-height:1;
  color:var(--gold-1);display:flex;align-items:baseline;gap:.2em}
.wcard .metric small{font-size:.32em;letter-spacing:.2em;color:var(--gold-2)}
.wcard .mlabel{font-size:.82em;color:var(--gold-2);letter-spacing:.18em;margin:.6em 0 .15em}
.wcard .wname{font-family:"Shippori Mincho B1";font-size:1.9em;font-weight:800;margin:.3em 0 .5em;color:#fff}
.wcard .praise{font-size:.84em;line-height:1.75;color:#cfc8b8}
.wcard .praise .by{color:var(--gold-2);font-weight:700}
.wcard.gold::after{content:"GOLD";position:absolute;right:-.1em;bottom:-.15em;font-family:"Cormorant Garamond";
  font-size:5em;font-weight:600;color:rgba(244,220,140,.07);font-style:italic}
.wcard.silver::after{content:"SILVER";position:absolute;right:-.1em;bottom:-.15em;font-family:"Cormorant Garamond";
  font-size:3.6em;font-weight:600;color:rgba(214,218,221,.06);font-style:italic}

.thankaward{text-align:center;align-items:center;z-index:2}
.thankaward .lat{font-size:3.4em;letter-spacing:.3em;color:var(--gold-1);font-style:italic;font-weight:600}
.thankaward p{font-family:"Shippori Mincho B1";font-size:1.4em;line-height:2;margin-top:.6em}
.thankaward .stamp{margin-top:1.4em;color:var(--gold-2);letter-spacing:.3em;font-size:.85em}

/* ---------- QUIZ ---------- */
.quiz{z-index:2;position:relative}
.quiz .qnum{font-family:"Bricolage Grotesque";font-size:1.1em;letter-spacing:.2em;color:var(--coral-deep);font-weight:800}
.quiz .q{font-size:2.5em;font-weight:900;line-height:1.4;margin:.3em 0 .8em;max-width:88%}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.9em;max-width:82%}
.opt{display:flex;align-items:center;gap:.8em;background:#fff;border:2px solid var(--coral-line);
  border-radius:.8em;padding:.8em 1.1em;font-size:1.25em;font-weight:700;transition:.3s;cursor:default}
.opt .ab{flex:none;width:1.8em;height:1.8em;border-radius:50%;background:var(--coral-soft);color:var(--coral-deep);
  display:flex;align-items:center;justify-content:center;font-family:"Bricolage Grotesque";font-weight:800}
.opt.correct{background:linear-gradient(90deg,#fff7e8,#ffe9c2);border-color:#f2a93b;
  box-shadow:0 12px 30px rgba(242,169,59,.3);transform:translateY(-2px)}
.opt.correct .ab{background:#f2a93b;color:#fff}
.quiz .reveal{margin-top:1.1em;display:inline-flex;align-items:center;gap:.6em;
  font-size:1.7em;font-weight:900;color:#f2952f;opacity:0;transform:translateY(8px);transition:.4s}
.quiz.revealed .reveal{opacity:1;transform:none}
.quiz .reveal .ring{width:1.4em;height:1.4em;border-radius:50%;border:.18em solid #f2952f;
  display:flex;align-items:center;justify-content:center;font-size:.7em}
.tapnote{font-size:.85em;color:var(--ink-soft);margin-top:.7em;letter-spacing:.05em}

/* fact slides (quiz interludes) */
.fact{z-index:2;position:relative}
.fact .big-num{font-family:"Bricolage Grotesque";font-weight:800;font-size:7em;line-height:.9;
  background:linear-gradient(120deg,var(--coral-deep),#f0a13a);-webkit-background-clip:text;background-clip:text;color:transparent}
.fact .cap{font-size:1.5em;font-weight:800;margin-top:.2em}
.fact .desc{font-size:1.05em;color:var(--ink-soft);margin-top:.6em;line-height:1.8;max-width:70%}
.locations{display:flex;flex-wrap:wrap;gap:.5em;margin-top:1em;max-width:80%}
.locations .loc{background:#fff;border:1.5px solid var(--coral-line);border-radius:999px;
  padding:.35em 1em;font-weight:700;font-size:1.05em}
.locations .loc.soon{background:var(--coral-soft);color:var(--coral-deep);opacity:.8}
.infogrid{display:grid;grid-template-columns:auto 1fr;gap:.6em 1.4em;font-size:1.05em;margin-top:.5em;max-width:80%}
.infogrid dt{color:var(--coral-deep);font-weight:800;letter-spacing:.06em}
.infogrid dd{font-weight:600}

/* ---------- HUD ---------- */
#hud{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;
  background:rgba(20,18,22,.7);backdrop-filter:blur(10px);padding:8px 14px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);z-index:50;color:#fff;font-family:"Bricolage Grotesque"}
#hud button{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#fff;
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s}
#hud button:hover{background:var(--coral)}
#counter{font-size:13px;letter-spacing:.1em;min-width:54px;text-align:center}
#progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--coral),#f0a13a);z-index:60;transition:width .4s}
#secname{position:fixed;top:14px;left:18px;z-index:50;font-size:11px;letter-spacing:.25em;
  color:rgba(255,255,255,.65);font-weight:700;text-transform:uppercase;font-family:"Bricolage Grotesque"}
.hint-fade{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);
  font-size:12px;z-index:40;letter-spacing:.1em;animation:fadeOut 5s forwards 3s}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
</style>
</head>
<body>
<div id="progress"></div>
<div id="secname"></div>
<div id="stage"><div id="deck"></div></div>
<div id="hud">
  <button id="prev">‹</button>
  <span id="counter">1 / 1</span>
  <button id="next">›</button>
</div>
<div class="hint-fade">← → キーまたはクリックでスライド送り ／ クイズは <b>スペース</b> で正解発表</div>

<script>
const PP_LOGO = `<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="11" stroke="white" stroke-width="1.6"/><path d="M12 7v10M7 12h10" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>`;
const brandLockup = `<span class="logo"><span class="tag">介護人材サービス</span><span class="mk">∿</span><span class="pl">＋</span><span class="hp">ホップ</span></span>`;

/* ---------- SLIDE DEFINITIONS ---------- */
const slides = [];
const S = (sec,theme,html)=>slides.push({sec,theme,html});

/* TITLE */
S('OPENING','t-coral',`
  <div class="title-wrap">
    <div class="brand" data-anim>${brandLockup}</div>
    <h1 class="big" data-anim>ホップ感謝祭</h1>
    <div class="date" data-anim>2026.03.13</div>
  </div>
  <div class="footbar"><span class="pp">${PP_LOGO}PlusPivot</span></div>`);

/* MC */
S('OPENING','t-coral',`
  <div class="section-head" data-anim><span class="bar"></span><span class="eyebrow">司会者の紹介 / MC</span></div>
  <div class="person">
    <div class="avatar" data-anim><span>髙</span></div>
    <div>
      <div class="role d1" data-anim>横浜オフィス ｜ 営業職</div>
      <div class="name d2" data-anim>髙田 勘太 <span style="font-size:.4em;color:var(--ink-soft);font-weight:600;">たかだ かんた</span></div>
      <ul class="meta">
        <li data-anim class="d3"><b>出身</b>神奈川県横浜市出身 ／ 27歳</li>
        <li data-anim class="d4"><b>キャッチ</b>横浜を愛し、横浜に愛されし男</li>
        <li data-anim class="d5"><b>受賞</b>第2期 ベストプレイヤー受賞 🏅</li>
      </ul>
      <div data-anim class="d6" style="margin-top:.6em">
        <span class="chip">趣味：サッカー</span><span class="chip">特技：遠泳</span>
      </div>
    </div>
  </div>
  <div class="footbar"><span class="pp">${PP_LOGO}PlusPivot</span></div>`);

/* SCHEDULE */
S('OPENING','t-coral',`
  <div class="section-head" data-anim><span class="bar"></span><span class="eyebrow">タイムスケジュール / TIME TABLE</span></div>

      .map((n,i)=>`<div class="note d${i+1}" data-anim><div class="ic">${n[0]}</div><div><h3>${n[1]}</h3><p>${n[2]}</p></div></div>`).join('')}
  </div>
  <div class="footbar"><span class="pp">${PP_LOGO}PlusPivot</span></div>`);

S('CLOSING','t-coral',`
  <div class="title-wrap">
    <div class="brand" data-anim style="font-size:2.6em">${brandLockup}</div>
    <h1 class="big d2" data-anim style="font-size:4.6em">本日はありがとう<br>ございました</h1>
    <div class="date d3" data-anim style="font-size:1.1em;letter-spacing:.1em">ホップは、これからも皆さんを “続ける” 力でサポートします。</div>
  </div>
  <div class="footbar"><span class="pp">${PP_LOGO}PlusPivot</span></div>`);

/* ---------- RENDER & ENGINE ---------- */
const deck=document.getElementById('deck');
slides.forEach((s,i)=>{
  const el=document.createElement('section');
  el.className='slide '+s.theme;
  el.dataset.sec=s.sec; el.dataset.idx=i;
  el.innerHTML=s.html;
  deck.appendChild(el);
});
const slideEls=[...document.querySelectorAll('.slide')];
let cur=0;
const counter=document.getElementById('counter');
const progress=document.getElementById('progress');
const secname=document.getElementById('secname');

function show(n){
  n=Math.max(0,Math.min(slideEls.length-1,n));
  slideEls[cur].classList.remove('active');
  cur=n;
  const el=slideEls[cur];
  el.classList.add('active');
  // reset quiz reveal
  const qz=el.querySelector('[data-quiz]');
  if(qz){qz.classList.remove('revealed');qz.querySelectorAll('.opt').forEach(o=>o.classList.remove('correct'));}
  counter.textContent=(cur+1)+' / '+slideEls.length;
  progress.style.width=((cur+1)/slideEls.length*100)+'%';
  secname.textContent=el.dataset.sec;
}
function next(){
  const el=slideEls[cur], qz=el.querySelector('[data-quiz]');
  if(qz && !qz.classList.contains('revealed')){ revealQuiz(qz); return; }
  show(cur+1);
}
function prev(){show(cur-1);}
function revealQuiz(qz){
  qz.classList.add('revealed');
  const ci=+qz.querySelector('.reveal').dataset.correct;
  const opt=qz.querySelector(`.opt[data-opt="${ci}"]`);
  if(opt)opt.classList.add('correct');
}

document.getElementById('next').onclick=next;
document.getElementById('prev').onclick=prev;
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='PageDown'){next();}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){prev();}
  else if(e.key===' '){e.preventDefault();
    const qz=slideEls[cur].querySelector('[data-quiz]');
    if(qz&&!qz.classList.contains('revealed'))revealQuiz(qz); else next();}
  else if(e.key==='Home')show(0);
  else if(e.key==='End')show(slideEls.length-1);
});
deck.addEventListener('click',e=>{
  if(e.target.closest('#hud'))return;
  const r=deck.getBoundingClientRect();
  (e.clientX-r.left < r.width*0.32)?prev():next();
});
// swipe
let sx=0;
deck.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
deck.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)(dx<0?next():prev());});

show(0);
</script>
</body>
</html>
